<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abbi &amp; Matt</title>
  <meta name="description" content="Abbi & Matt are getting married — wedding website coming soon.">
  <meta property="og:title" content="Abbi & Matt">
  <meta property="og:description" content="Our wedding website is coming soon.">
  <meta property="og:image" content="https://abbiandmatt.co.uk/images/ring.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #1a1a1a;
    }

    .photos {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: row;
    }

    .photos .panel {
      flex: 1;
      overflow: hidden;
    }

    .photos img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* soft dark wash so the white type always reads */
    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.25) 60%, rgba(0,0,0,0.35) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      padding: 2rem;
    }

    .names {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(3rem, 9vw, 6.5rem);
      line-height: 1.1;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 24px rgba(0,0,0,0.5);
      animation: fadeUp 1.4s ease both;
    }

    .amp {
      font-style: italic;
      font-size: 0.75em;
      opacity: 0.9;
    }

    .rule {
      width: 64px;
      height: 1px;
      background: rgba(255,255,255,0.7);
      margin: 1.75rem 0;
      animation: fadeUp 1.4s 0.3s ease both;
    }

    .coming-soon {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      letter-spacing: 0.55em;
      text-indent: 0.55em; /* balances the letter-spacing on the last char */
      text-transform: uppercase;
      text-shadow: 0 1px 12px rgba(0,0,0,0.5);
      animation: fadeUp 1.4s 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* stack on mobile */
    @media (max-width: 700px) {
      .photos { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="photos">
    <div class="panel"><img src="images/proposal.jpg" alt="Matt proposing to Abbi on the beach"></div>
    <div class="panel"><img src="images/ring.jpg" alt="Abbi and Matt celebrating with the ring"></div>
  </div>
  <div class="overlay">
    <h1 class="names">Abbi <span class="amp">&amp;</span> Matt</h1>
    <div class="rule"></div>
    <p class="coming-soon">Coming Soon</p>
  </div>
</body>
</html>
